<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Thaha From Unknown to Known</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/emoji-button/4.6.4/index.js"></script>
</head>
<body>
<div class="messenger">
    <div class="conversations-panel">
        <div class="profile-header">
            <div class="profile-left" onclick="viewOwnProfile()">
                <div class="profile-avatar"></div>
                <div class="profile-name">
                    <h2></h2>
                    <p>Online</p>
                </div>
            </div>
        </div>
        <div class="search-section">
            <div class="search-box">
                <button class="theme-icon-btn" id="searchBtn" aria-label="Search" onclick="handleSearchClick()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <input type="text" placeholder="Search" id="searchInput" onkeyup="filterChats()">
            </div>
        </div>
        <div class="chats-section" id="chatsScrollable">
            <div class="section-title">Chats</div>
            <div id="chatThreadsContainer">
                <div class="loading">Loading conversations...</div>
            </div>
        </div>
        <div class="bottom-actions">
            <div class="action-row clickable-action" id="newChatTrigger">
                <span class="action-icon"><i class="fa-solid fa-pen-to-square"></i></span>
                <span>New message</span>
            </div>
            <div id="usersModal" class="users-modal hidden">
                <div class="users-box">
                    <h3>Select User</h3>
                    <div id="usersList"></div>
                    <button onclick="closeUsersModal()">Close</button>
                </div>
            </div>
            <div class="action-row clickable-action" id="newGroupTrigger">
                <span class="action-icon"><i class="fa-solid fa-users"></i></span>
                <span>Create group</span>
            </div>
        </div>
    </div>
    <div class="chat-window" id="chatWindow">
        <div class="empty-state" id="emptyState">
            <div class="empty-icon-theme"><i class="fa-solid fa-comments"></i></div>
            <div class="empty-title">Select a chat</div>
            <div class="empty-subtitle">Choose a conversation from the list to start messaging</div>
        </div>
        <div class="chat-active hidden" id="chatActive">
            <div class="window-header">
                <div class="contact-badge" id="activeContact" onclick="viewContactProfile()">
                    <div class="badge-avatar"></div>
                    <div class="contact-details">
                        <h3></h3>
                        <div class="status-line">Online</div>
                    </div>
                </div>
                <div class="header-tools">
                    <button class="theme-icon-btn" id="audioCallBtn" aria-label="Audio Call" onclick="handleAudioCall()">
                        <i class="fa-solid fa-phone"></i>
                    </button>
                    <button class="theme-icon-btn" id="videoCallBtn" aria-label="Video Call" onclick="handleVideoCall()">
                        <i class="fa-solid fa-video"></i>
                    </button>
                    <button class="icon-btn" id="optionsBtn" aria-label="Options">⋯</button>
                </div>
            </div>
            <div class="messages-thread" id="messagesThread">
                <div class="loading">Loading messages...</div>
            </div>
            <div class="composer">
                <div class="composer-box">
                    <button class="emoji-icon" id="emojiBtn" style="background:transparent; border:none; font-size:1.2rem; cursor:pointer;">😊</button>
                    <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                    <button class="send-icon" id="sendMessageBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal-overlay" id="profileModal">
    <div class="profile-modal">
        <div class="modal-header">
            <h3>Profile</h3>
            <button class="close-modal" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="profile-avatar-large" id="modalUserAvatar"></div>
            <div class="profile-field">
                <label>Name</label>
                <input type="text" id="modalUserName">
            </div>
            <div class="profile-field">
                <label>Email</label>
                <input type="email" id="modalUserEmail" readonly>
            </div>
            <div class="profile-field">
                <label>Bio</label>
                <textarea id="modalUserBio" rows="3" placeholder="Tell something about yourself..."></textarea>
            </div>
            <button class="save-profile-btn" id="saveProfileBtn">Save Changes</button>
        </div>
    </div>
</div>
<div class="call-window hidden" id="callWindow">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay muted playsinline></video>
    <button onclick="endCall()">End Call</button>
</div>
<div id="messageMenu" class="message-menu hidden">
    <button onclick="editSelectedMessage()">Edit</button>
    <button onclick="deleteSelectedMessage()">Delete</button>
    <button onclick="replySelectedMessage()">Reply</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="/js/script.js"></script>
<script src="/js/call.js"></script>
</body>
</html>
```
